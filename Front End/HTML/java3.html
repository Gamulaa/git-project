<!DOCTYPE html>
<html>
  <body>
    
   <h1>Enter radius </h1>
   <label>Enter radius:</label>
   <input type="number" id="here">
   <button onclick="calc()">Get Area</button>
   <p id="rad"></p>
   <script>
    function calc(){
      const PI=3.14;
    let radius=Number(document.getElementById("here").value);
    let area=PI*radius*radius;
    document.getElementById("rad").innerHTML="The area of the given radius is " + area + "cm<sup>2</sup>";
    }
    
   </script>
  </body>
</html>
