<!DOCTYPE html>
<html>
<body>

<h2>Age Category Checker</h2>

<input type="number" id="ageInput" placeholder="Enter your age">
<button onclick="checkAge()">Check</button>

<p id="result"></p>

<script>
function checkAge(){

    let age = document.getElementById("ageInput").value;

    if(age === ""){
        document.getElementById("result").innerHTML = "Please enter your age!";
        return;
    }

    age = Number(age);

    if(age < 0){
        document.getElementById("result").innerHTML = "Invalid age!";
    }
    else if(age < 13){
        document.getElementById("result").innerHTML = "You are a child.";
    }
    else if(age < 18){
        document.getElementById("result").innerHTML = "You are a teenager.";
    }
    else if(age < 60){
        document.getElementById("result").innerHTML = "You are an adult.";
    }
    else{
        document.getElementById("result").innerHTML = "You are a senior.";
    }

}
</script>

</body>
</html>
